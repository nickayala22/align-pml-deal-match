<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Partner Profile | Align Equity Group</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --border: #222222;
  --border2: #2a2a2a;
  --text: #f0ede8;
  --muted: #666;
  --accent: #39ff85;
  --accent2: #7affb2;
  --red: #e05c4a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;min-height:100vh;padding:0;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);}

/* ── PARTNER-FACING LAYOUT ── */
.partner-wrap{max-width:560px;margin:0 auto;padding:40px 20px 60px;}
.partner-header{margin-bottom:36px;}
.partner-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;}
.partner-logo span{color:var(--accent);}
.partner-tagline{font-size:11px;color:var(--muted);line-height:1.6;max-width:420px;}
.partner-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.2;}
.partner-sub{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:32px;}

/* ── QUICK INTAKE LAYOUT ── */
.quick-wrap{max-width:480px;margin:0 auto;padding:20px 16px 80px;}
.quick-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.quick-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.quick-subtitle{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── SHARED FORM STYLES ── */
.form-section{margin-bottom:28px;}
.section-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-num{width:22px;height:22px;border-radius:50%;background:rgba(57,255,133,0.1);border:1px solid rgba(57,255,133,0.25);color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.form-label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:#888;margin-bottom:5px;font-weight:500;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:5px;font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color 0.15s;-webkit-appearance:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--muted);}
.form-textarea{resize:vertical;min-height:72px;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group{margin-bottom:12px;}

/* checkbox pills */
.pill-group{display:flex;flex-wrap:wrap;gap:6px;}
.pill-option{position:relative;}
.pill-option input{position:absolute;opacity:0;width:0;height:0;}
.pill-option label{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border:1px solid var(--border2);border-radius:20px;font-size:11px;cursor:pointer;color:#777;background:var(--surface);transition:all 0.12s;user-select:none;white-space:nowrap;}
.pill-option label:hover{border-color:#444;color:var(--text);}
.pill-option input:checked+label{background:rgba(57,255,133,0.08);border-color:var(--accent);color:var(--accent);font-weight:500;}

/* submit */
.submit-wrap{position:sticky;bottom:0;background:linear-gradient(to top, var(--bg) 70%, transparent);padding:20px 0 16px;}
.submit-btn{width:100%;background:var(--accent);border:none;color:#000;padding:14px;border-radius:6px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:background 0.15s;letter-spacing:0.2px;}
.submit-btn:hover{background:var(--accent2);}
.submit-btn:disabled{background:#333;color:#666;cursor:not-allowed;}

/* success */
.success-screen{display:none;text-align:center;padding:60px 20px;}
.success-icon{font-size:48px;margin-bottom:16px;}
.success-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;}
.success-sub{font-size:12px;color:var(--muted);line-height:1.7;max-width:360px;margin:0 auto;}

/* progress bar (partner form) */
.progress-bar{height:2px;background:var(--border);border-radius:1px;margin-bottom:32px;}
.progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.3s ease;}

/* error */
.form-error{color:var(--red);font-size:10px;margin-top:4px;display:none;}
.submit-error{color:var(--red);font-size:11px;text-align:center;margin-top:8px;display:none;}

/* divider */
.divider{border:none;border-top:1px solid var(--border);margin:24px 0;}

@media(max-width:480px){
  .form-row{grid-template-columns:1fr;}
  .partner-wrap{padding:24px 16px 60px;}
}
</style>
</head>

// ── PROGRESS BAR (partner form only) ──────────────────
function updateProgress() {
  if (isQuick) return;
  const name  = document.getElementById('fName')?.value.trim();
  const email = document.getElementById('fEmail')?.value.trim();
  const types = document.querySelectorAll('#capitalTypes input:checked').length;
  let pct = 0;
  if (name)  pct += 30;
  if (email) pct += 20;
  if (types) pct += 50;
  const fill = document.getElementById('progressFill');
  if (fill) fill.style.width = pct + '%';
}

// ── SUBMIT ─────────────────────────────────────────────
async function submitForm() {
  const name = document.getElementById('fName')?.value.trim();
  if (!name) { alert('Name is required.'); return; }

  const capitalTypes = checked('#ct-debt,#ct-equity,#ct-hard-money,#ct-mezz,#ct-bridge,#ct-preferred,#ct-dscr,#ct-private-credit,#ct-lp,#ct-dscr');
  const assetTypes   = checked('#at-mf,#at-ind,#at-ret,#at-off,#at-mix,#at-ss,#at-hot,#at-land,#at-nnn,#at-sfr,#at-biz');
  const geography    = checked('#geo-nat,#geo-fl,#geo-tx,#geo-se,#geo-sw,#geo-ne,#geo-mw');
  const compTypes    = checked('#comp-success,#comp-points,#comp-interest,#comp-equity,#comp-pref,#comp-carry,#comp-mgmt,#comp-referral');

  const data = {
    name,
    org:          val('fOrg'),
    email:        val('fEmail'),
    phone:        val('fPhone'),
    capital_types: capitalTypes,
    min_check:    val('fMinCheck'),
    max_check:    val('fMaxCheck'),
    ltv:          val('fLtv'),
    return_target: val('fReturn'),
    asset_types:  assetTypes,
    geography,
    comp_types:   compTypes,
    comp_details: val('fCompDetails'),
    relationship: val('fRelationship'),
    notes:        val('fNotes'),
  };

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Submitting...';
  btn.disabled    = true;
  document.getElementById('submitError').style.display = 'none';

  try {
    const res  = await fetch(WORKER + '/onboard', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(data),
    });
    const result = await res.json();
    if (!res.ok || !result.success) throw new Error(result.error || 'Failed');

    // Show success
    document.getElementById('partnerForm').style.display = 'none';
    const s = document.getElementById('successScreen');
    s.style.display = 'block';
    if (isQuick) {
      document.getElementById('successTitle').textContent = 'Added to CRM.';
      document.getElementById('successSub').textContent   = name + ' has been added as Pending Review. Review and activate in the Partners tab.';
    }
  } catch(e) {
    document.getElementById('submitError').style.display = 'block';
    btn.textContent = isQuick ? 'Add to CRM as Pending Review' : 'Submit My Capital Profile';
    btn.disabled    = false;
  }
}

function val(id) { return document.getElementById(id)?.value.trim() || ''; }
function checked(sel) {
  return Array.from(document.querySelectorAll(sel))
    .filter(el => el.checked)
    .map(el => el.value);
}
</script>
